name: Publish Staging Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-staging-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'staging'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          short_sha="$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          release_tag="staging-$(date -u +%Y%m%d%H%M)-${short_sha}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/api.Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          cache-from: type=gha,scope=rescuebase-api-staging
          cache-to: type=gha,mode=max,scope=rescuebase-api-staging
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:${{ steps.meta.outputs.release_tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:staging-latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/web.Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          cache-from: type=gha,scope=rescuebase-web-staging
          cache-to: type=gha,mode=max,scope=rescuebase-web-staging
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:${{ steps.meta.outputs.release_tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:staging-latest
