name: Promote Staging Images to Production

on:
  workflow_dispatch:
    inputs:
      staging_tag:
        description: Immutable staging image tag to promote
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        env:
          STAGING_TAG: ${{ inputs.staging_tag }}
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          staging_tag="$STAGING_TAG"
          if ! printf '%s' "$staging_tag" | grep -Eq '^staging-[0-9]{12}-[0-9a-f]{7}$'; then
            echo "staging_tag must be an immutable staging tag (staging-YYYYMMDDHHmm-<shortsha>)." >&2
            exit 1
          fi
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "staging_tag=$staging_tag" >> "$GITHUB_OUTPUT"
          echo "production_tag=prod-${staging_tag#staging-}" >> "$GITHUB_OUTPUT"

      - name: Verify staging images exist
        run: |
          docker buildx imagetools inspect "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:${{ steps.meta.outputs.staging_tag }}"
          docker buildx imagetools inspect "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:${{ steps.meta.outputs.staging_tag }}"

      - name: Promote API image without rebuilding
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:${{ steps.meta.outputs.production_tag }}" \
            --tag "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:production-latest" \
            "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-api:${{ steps.meta.outputs.staging_tag }}"

      - name: Promote web image without rebuilding
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:${{ steps.meta.outputs.production_tag }}" \
            --tag "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:production-latest" \
            "ghcr.io/${{ steps.meta.outputs.owner }}/rescuebase-web:${{ steps.meta.outputs.staging_tag }}"

      - name: Publish promotion summary
        run: |
          echo "Promoted ${{ steps.meta.outputs.staging_tag }} to ${{ steps.meta.outputs.production_tag }}." >> "$GITHUB_STEP_SUMMARY"
