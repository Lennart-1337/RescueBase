name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: self-hosted
    env:
      DATABASE_URL: mysql://rescuebase:rescuebase@127.0.0.1:3306/rescuebase
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: rescuebase
          MARIADB_USER: rescuebase
          MARIADB_PASSWORD: rescuebase
          MARIADB_ROOT_PASSWORD: rescuebase-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm

      - run: npm ci --prefer-offline
      - run: npm run lint -w @rescuebase/domain
      - run: npm test -w @rescuebase/domain
      - run: npm run typecheck -w @rescuebase/domain
      - run: npm run lint -w @rescuebase/api
      - run: npm test -w @rescuebase/api
      - run: npm run build -w @rescuebase/api
      - run: npm run typecheck -w @rescuebase/api

  frontend:
    name: Frontend
    runs-on: self-hosted
    env:
      DATABASE_URL: mysql://rescuebase:rescuebase@127.0.0.1:3306/rescuebase
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24.18.0
          cache: npm

      - run: npm ci --prefer-offline
      - run: npm run generate:api-client
      - run: git diff --exit-code -- apps/api/openapi.json apps/web/src/lib/generated-api.d.ts

      - run: npm run lint -w @rescuebase/web
      - run: npm run test -w @rescuebase/web
      - run: npm run typecheck -w @rescuebase/web
      - run: npm run build -w @rescuebase/web

  deploy-config:
    name: Deploy config
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          sh -n scripts/staging/deploy.sh
          sh -n scripts/staging/backup.sh
          sh -n scripts/staging/restore.sh
          sh -n scripts/production/deploy.sh

      - name: Validate compose configs
        run: |
          docker compose --env-file .env.staging.example -f docker-compose.yml -f docker-compose.staging.yml config >/dev/null
          docker compose --env-file .env.production.example -f docker-compose.yml -f docker-compose.production.yml config >/dev/null
