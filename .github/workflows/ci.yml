name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
          cache: npm

      - run: npm ci
      - run: npm run generate:api-client

      - name: Stage generated contract
        run: |
          rm -rf .artifacts/api-client
          mkdir -p .artifacts/api-client/apps/api .artifacts/api-client/apps/web/src/lib
          cp apps/api/openapi.json .artifacts/api-client/apps/api/openapi.json
          cp apps/web/src/lib/generated-api.d.ts .artifacts/api-client/apps/web/src/lib/generated-api.d.ts

      - uses: actions/upload-artifact@v7
        with:
          name: api-client
          path: .artifacts/api-client
          if-no-files-found: error
          retention-days: 1

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: rescuebase
          MARIADB_USER: rescuebase
          MARIADB_PASSWORD: rescuebase
          MARIADB_ROOT_PASSWORD: rescuebase-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
          cache: npm

      - run: npm ci
      - run: npm run lint -w @rescuebase/api
      - run: npm run build -w @rescuebase/domain
      - run: npm run prisma:generate -w @rescuebase/api
      - run: npm run typecheck -w @rescuebase/api
      - run: npm run test -w @rescuebase/api
        env:
          REQUIRE_TESTCONTAINERS: "true"
      - run: npm run build -w @rescuebase/api

  frontend:
    name: Frontend
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
          cache: npm

      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: api-client
          path: .artifacts/api-client

      - name: Restore generated contract
        run: |
          cp .artifacts/api-client/apps/api/openapi.json apps/api/openapi.json
          cp .artifacts/api-client/apps/web/src/lib/generated-api.d.ts apps/web/src/lib/generated-api.d.ts

      - run: npm run lint -w @rescuebase/web
      - run: npm run typecheck -w @rescuebase/web
      - run: npm run test -w @rescuebase/web
      - run: npm run build -w @rescuebase/web

  deploy-config:
    name: Deploy config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          sh -n scripts/staging/deploy.sh
          sh -n scripts/staging/backup.sh
          sh -n scripts/staging/restore.sh
          sh -n scripts/production/deploy.sh

      - name: Validate compose configs
        run: |
          docker compose --env-file .env.staging.example -f docker-compose.yml -f docker-compose.staging.yml config >/dev/null
          docker compose --env-file .env.production.example -f docker-compose.yml -f docker-compose.production.yml config >/dev/null
