name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: rescuebase
          MARIADB_USER: rescuebase
          MARIADB_PASSWORD: rescuebase
          MARIADB_ROOT_PASSWORD: rescuebase-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:api-client
      - run: npm run lint
      - run: npm run test
        env:
          REQUIRE_TESTCONTAINERS: "true"
      - run: npm run typecheck
      - run: npm run build
