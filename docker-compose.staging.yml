services:
  mariadb:
    ports: !reset []
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_PASSWORD}

  api:
    image: ${API_IMAGE}:${IMAGE_TAG}
    build: !reset null
    pull_policy: always
    environment:
      NODE_ENV: production
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      RESCUEBASE_SEED_DEV_DATA: "false"

  web:
    image: ${WEB_IMAGE}:${IMAGE_TAG}
    build: !reset null
    pull_policy: always

  caddy:
    command: ["caddy", "run", "--config", "/srv/caddy-config/Caddyfile.staging", "--adapter", "caddyfile"]
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ${CLOUDFLARE_ORIGIN_CERT_HOST_FILE}:/srv/certs/origin-cert.pem:ro
      - ${CLOUDFLARE_ORIGIN_KEY_HOST_FILE}:/srv/certs/origin-key.pem:ro

  backup:
    image: ${API_IMAGE}:${IMAGE_TAG}
    pull_policy: always
    profiles: ["ops"]
    restart: "no"
    command: ["sh", "/app/infra/backups/backup-mariadb.sh"]
    environment:
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT}
      RETENTION_DAYS: ${RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
    depends_on:
      mariadb:
        condition: service_healthy

  restore:
    image: ${API_IMAGE}:${IMAGE_TAG}
    pull_policy: always
    profiles: ["ops"]
    restart: "no"
    command: ["sh", "/app/infra/backups/restore-mariadb.sh"]
    environment:
      DATABASE_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      AGE_IDENTITY_FILE: ${AGE_IDENTITY_FILE:-/run/secrets/staging.agekey}
      BACKUP_FILE: ${BACKUP_FILE:-}
    volumes:
      - ./backups:/backups
      - ${AGE_IDENTITY_HOST_FILE:-./keys/restore-disabled.txt}:${AGE_IDENTITY_FILE:-/run/secrets/staging.agekey}:ro
    depends_on:
      mariadb:
        condition: service_healthy
